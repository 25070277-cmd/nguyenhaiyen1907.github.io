<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background-color: #f4f4f9;
        }
        .calculator-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 350px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #218838;
        }
        .result-area {
            margin-top: 20px;
            border-top: 2px solid #eee;
            padding-top: 15px;
        }
        #error-msg {
            color: red;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>CALCULATOR</h2>
    
    <div class="form-group">
        <label>Number 1:</label>
        <input type="text" id="num1" placeholder="Nhập số thứ nhất">
    </div>

    <div class="form-group">
        <label>Operator (+, -, *, /, %):</label>
        <input type="text" id="operator" placeholder="Ví dụ: +">
    </div>

    <div class="form-group">
        <label>Number 2:</label>
        <input type="text" id="num2" placeholder="Nhập số thứ hai">
    </div>

    <button onclick="calculate()">Calculate</button>
    <p id="error-msg">Vui lòng nhập đúng định dạng số và toán tử!</p>

    <div class="result-area">
        <label>Result:</label>
        <input type="text" id="result" readonly style="background-color: #e9ecef; font-weight: bold; color: #000;">
    </div>
</div>

<script>
    function calculate() {
        // 1. Lấy giá trị từ các ô input
        const n1 = document.getElementById('num1').value.trim();
        const op = document.getElementById('operator').value.trim();
        const n2 = document.getElementById('num2').value.trim();
        const errorMsg = document.getElementById('error-msg');
        const resultField = document.getElementById('result');

        const numberReg = /^-?\d*\.?\d+$/;

        const operatorReg = /^[\+\-\*\/\%]$/;

        const isN1Valid = numberReg.test(n1);
        const isN2Valid = numberReg.test(n2);
        const isOpValid = operatorReg.test(op);

        if (isN1Valid && isN2Valid && isOpValid) {
            errorMsg.style.display = 'none';

            try {

                const expression = n1 + op + n2;
                const total = eval(expression);

                resultField.value = total;
            } catch (e) {
                resultField.value = "Error";
            }
            errorMsg.style.display = 'block';
            resultField.value = "";
        }
    }
</script>

</body>
</html>
